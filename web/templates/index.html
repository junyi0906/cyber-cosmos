<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🌌 Cyber Cosmos — 宇宙观测台</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            background: #0a0a12;
            color: #c8d6e5;
            font-family: 'SF Mono', 'Fira Code', monospace;
            min-height: 100vh;
            overflow: hidden;
        }
        
        .container {
            max-width: 1600px;
            margin: 0 auto;
            padding: 15px 20px;
            height: 100vh;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid #1a1a2e;
            flex-shrink: 0;
        }
        
        h1 { font-size: 1.3rem; color: #82fff7; }
        
        .stats {
            display: flex;
            gap: 25px;
        }
        
        .stat { text-align: center; }
        .stat-value { font-size: 1.5rem; color: #82fff7; font-weight: bold; }
        .stat-label { font-size: 0.65rem; color: #636e72; text-transform: uppercase; }
        
        .main-content {
            display: grid;
            grid-template-columns: 1fr 380px;
            gap: 15px;
            flex: 1;
            min-height: 0;
        }
        
        /* 3D Universe Map */
        #universe-map {
            background: #0a0a12;
            border: 1px solid #1a1a2e;
            border-radius: 8px;
            overflow: hidden;
            position: relative;
        }
        
        #map-canvas {
            width: 100%;
            height: 100%;
            display: block;
        }
        
        .map-overlay {
            position: absolute;
            bottom: 15px;
            left: 15px;
            background: rgba(10,10,18,0.85);
            border: 1px solid #1a1a2e;
            border-radius: 6px;
            padding: 10px 14px;
            font-size: 0.7rem;
        }
        
        .map-overlay .legend-item {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 5px;
        }
        
        .map-overlay .legend-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
        }
        
        .map-hint {
            position: absolute;
            top: 12px;
            right: 12px;
            background: rgba(10,10,18,0.7);
            border: 1px solid #1a1a2e;
            border-radius: 4px;
            padding: 6px 10px;
            font-size: 0.65rem;
            color: #636e72;
        }
        
        .side-panel {
            display: flex;
            flex-direction: column;
            gap: 15px;
            min-height: 0;
        }
        
        .panel {
            background: #0f0f1a;
            border: 1px solid #1a1a2e;
            border-radius: 8px;
            padding: 15px;
            flex-shrink: 0;
        }
        
        .panel-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
            padding-bottom: 8px;
            border-bottom: 1px solid #1a1a2e;
        }
        
        .panel-title {
            font-size: 0.8rem;
            color: #82fff7;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .event-feed {
            flex: 1;
            overflow-y: auto;
            min-height: 0;
            max-height: 300px;
        }
        
        .event-item {
            padding: 8px;
            border-left: 3px solid #1a1a2e;
            margin-bottom: 8px;
            font-size: 0.78rem;
        }
        
        .event-item.signal { border-color: #fdcb6e; }
        .event-item.strike { border-color: #ff7675; }
        .event-item.alliance { border-color: #00b894; }
        .event-item.death { border-color: #d63031; }
        .event-item.tech { border-color: #0984e3; }
        .event-item.subworld { border-color: #a29bfe; }
        .event-item.observation { border-color: #74b9ff; }
        
        .event-time {
            font-size: 0.65rem;
            color: #636e72;
            margin-bottom: 3px;
        }
        
        .event-narrative {
            color: #b2bec3;
            line-height: 1.4;
        }
        
        .civilization-list {
            max-height: 200px;
            overflow-y: auto;
        }
        
        .civilization-item {
            padding: 10px;
            border: 1px solid #1a1a2e;
            border-radius: 6px;
            margin-bottom: 6px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .civilization-item:hover { border-color: #82fff7; }
        .civilization-item.dead { opacity: 0.4; text-decoration: line-through; }
        .civilization-item.selected { border-color: #82fff7; background: rgba(130,255,247,0.05); }
        
        .civ-name { font-weight: bold; color: #fff; font-size: 0.85rem; }
        .civ-info { font-size: 0.7rem; color: #636e72; margin-top: 3px; }
        
        .civ-bars { display: flex; gap: 6px; align-items: center; }
        .bar { width: 40px; height: 4px; background: #1a1a2e; border-radius: 2px; overflow: hidden; }
        .bar-fill { height: 100%; border-radius: 2px; }
        .tech-fill { background: #0984e3; }
        .defense-fill { background: #00b894; }
        .dot-alive { width: 8px; height: 8px; border-radius: 50%; background: #00b894; }
        .dot-dead { width: 8px; height: 8px; border-radius: 50%; background: #d63031; }
        
        .connection-status {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #636e72;
        }
        .connection-status.connected { background: #00b894; }
        
        .empty-state {
            text-align: center;
            padding: 30px;
            color: #636e72;
            font-size: 0.8rem;
        }
        
        .civ-detail-popup {
            position: absolute;
            background: rgba(10,10,18,0.95);
            border: 1px solid #82fff7;
            border-radius: 8px;
            padding: 14px;
            font-size: 0.75rem;
            min-width: 200px;
            z-index: 100;
            display: none;
        }
        
        .civ-detail-popup.active { display: block; }
        .civ-detail-popup .popup-name { font-weight: bold; color: #fff; font-size: 0.9rem; margin-bottom: 8px; }
        .civ-detail-popup .popup-row { display: flex; justify-content: space-between; margin-bottom: 5px; }
        .civ-detail-popup .popup-label { color: #636e72; }
        .popup-close { color: #636e72; cursor: pointer; float: right; }
        
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
        .live-indicator { animation: pulse 2s infinite; color: #00b894; }
        
        /* Scrollbar */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: #0a0a12; }
        ::-webkit-scrollbar-thumb { background: #1a1a2e; border-radius: 2px;         @keyframes flashFade { from { opacity: 1; } to { opacity: 0; } }
}
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div>
                <h1>🌌 Cyber Cosmos</h1>
                <span style="font-size:0.7rem;color:#636e72;">
                    宇宙观测台 · <span class="live-indicator">● LIVE</span>
                    <span id="status" class="connection-status" style="margin-left:5px;"></span>
                </span>
            </div>
            <div class="stats">
                <div class="stat"><div class="stat-value" id="stat-civs">—</div><div class="stat-label">活跃文明</div></div>
                <div class="stat"><div class="stat-value" id="stat-events">—</div><div class="stat-label">历史事件</div></div>
                <div class="stat"><div class="stat-value" id="stat-subworlds">—</div><div class="stat-label">子世界</div></div>
            </div>
        </header>
        
        <div class="main-content">
            <div id="universe-map">
                <canvas id="map-canvas"></canvas>
                <div class="map-hint">拖拽旋转 · 滚轮缩放 · 点击文明查看详情</div>
                <div class="map-overlay">
                    <div class="legend-item"><div class="legend-dot" style="background:#0984e3;"></div> 低科技</div>
                    <div class="legend-item"><div class="legend-dot" style="background:#fdcb6e;"></div> 中科技</div>
                    <div class="legend-item"><div class="legend-dot" style="background:#ff7675;"></div> 高科技</div>
                    <div class="legend-item"><div class="legend-dot" style="background:#d63031;"></div> 已毁灭</div>
                </div>
                <div class="civ-detail-popup" id="civ-popup">
                    <div class="popup-close" onclick="hidePopup()">✕</div>
                    <div class="popup-name" id="popup-name">—</div>
                    <div class="popup-row"><span class="popup-label">科技</span><span id="popup-tech">—</span></div>
                    <div class="popup-row"><span class="popup-label">防御</span><span id="popup-defense">—</span></div>
                    <div class="popup-row"><span class="popup-label">信号控制</span><span id="popup-signal">—</span></div>
                    <div class="popup-row"><span class="popup-label">位置</span><span id="popup-pos">—</span></div>
                    <div class="popup-row"><span class="popup-label">状态</span><span id="popup-status">—</span></div>
                </div>
            </div>
            
            <div class="side-panel">
                <div class="panel">
                    <div class="panel-header">
                        <span class="panel-title">🪐 活跃文明</span>
                        <span id="civ-count" style="font-size:0.7rem;color:#636e72;">—</span>
                    </div>
                    <div class="civilization-list" id="civilization-list">
                        <div class="empty-state">等待数据...</div>
                    </div>
                </div>
                
                <div class="panel" style="flex:1;display:flex;flex-direction:column;min-height:0;">
                    <div class="panel-header">
                        <span class="panel-title">📡 事件流</span>
                        <span style="font-size:0.7rem;color:#636e72;">实时</span>
                    </div>
                    <div class="event-feed" id="event-feed">
                        <div class="empty-state">等待宇宙事件...</div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/three@0.158.0/build/three.min.js"></script>
    <script>
        let ws = null;
        let civilizations = [];
        let history = [];
        let selectedCivId = null;
        
        // Three.js setup
        let scene, camera, renderer, controls;
        let civMeshes = {};
        let stars = [];
        const UNIVERSE_SIZE = 1000;
        
        function initThree() {
            const canvas = document.getElementById('map-canvas');
            const container = document.getElementById('universe-map');
            const w = container.clientWidth;
            const h = container.clientHeight;
            
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x0a0a12);
            
            camera = new THREE.PerspectiveCamera(60, w / h, 1, 5000);
            camera.position.set(0, 400, 800);
            camera.lookAt(0, 0, 0);
            
            renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
            renderer.setSize(w, h);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            
            // Lights
            const ambient = new THREE.AmbientLight(0xffffff, 0.3);
            scene.add(ambient);
            
            // Stars background
            const starGeo = new THREE.BufferGeometry();
            const starCount = 3000;
            const positions = new Float32Array(starCount * 3);
            for (let i = 0; i < starCount * 3; i++) {
                positions[i] = (Math.random() - 0.5) * 4000;
            }
            starGeo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            const starMat = new THREE.PointsMaterial({ color: 0xffffff, size: 1, transparent: true, opacity: 0.6 });
            const starField = new THREE.Points(starGeo, starMat);
            scene.add(starField);
            
            // Grid lines (subtle)
            const gridHelper = new THREE.GridHelper(1000, 20, 0x1a1a2e, 0x1a1a2e);
            gridHelper.position.y = -300;
            scene.add(gridHelper);
            
            // Mouse controls
            let isDragging = false;
            let prevMouse = { x: 0, y: 0 };
            let theta = 0, phi = Math.PI / 4, radius = 900;
            
            canvas.addEventListener('mousedown', (e) => {
                isDragging = true;
                prevMouse = { x: e.clientX, y: e.clientY };
            });
            
            canvas.addEventListener('mousemove', (e) => {
                if (!isDragging) return;
                const dx = e.clientX - prevMouse.x;
                const dy = e.clientY - prevMouse.y;
                theta -= dx * 0.005;
                phi = Math.max(0.1, Math.min(Math.PI - 0.1, phi - dy * 0.005));
                prevMouse = { x: e.clientX, y: e.clientY };
                updateCamera();
            });
            
            canvas.addEventListener('mouseup', () => { isDragging = false; });
            
            canvas.addEventListener('wheel', (e) => {
                radius = Math.max(200, Math.min(2000, radius + e.deltaY * 0.5));
                updateCamera();
            });
            
            canvas.addEventListener('click', (e) => {
                const rect = canvas.getBoundingClientRect();
                const x = (e.clientX - rect.left) / rect.width * 2 - 1;
                const y = -(e.clientY - rect.top) / rect.height * 2 + 1;
                
                const raycaster = new THREE.Raycaster();
                raycaster.setFromCamera(new THREE.Vector2(x, y), camera);
                const meshArr = Object.values(civMeshes);
                const intersects = raycaster.intersectObjects(meshArr.map(m => m.mesh));
                
                if (intersects.length > 0) {
                    const civId = intersects[0].object.userData.civId;
                    showCivPopup(civId, e.clientX, e.clientY);
                } else {
                    hidePopup();
                }
            });
            
            function updateCamera() {
                camera.position.x = radius * Math.sin(phi) * Math.sin(theta);
                camera.position.y = radius * Math.cos(phi);
                camera.position.z = radius * Math.sin(phi) * Math.cos(theta);
                camera.lookAt(0, 0, 0);
            }
            
            updateCamera();
            animate();
        }
        
        function animate() {
            requestAnimationFrame(animate);
            renderer.render(scene, camera);

            // Pulse effect on civilization spheres
            const t = Date.now() * 0.001;
            for (const [id, data] of Object.entries(civMeshes)) {
                if (data.civ.is_alive) {
                    const scale = 1 + Math.sin(t * 2 + data.mesh.position.x) * 0.1;
                    data.mesh.scale.setScalar(scale);
                }
            }

            // Explosion particles
            if (window.explosionParticles) {
                window.explosionParticles = window.explosionParticles.filter(p => {
                    p.position.add(p.userData.velocity.clone().multiplyScalar(0.1));
                    p.userData.velocity.multiplyScalar(0.96);
                    p.userData.life--;
                    p.material.opacity = p.userData.life / 60;
                    if (p.userData.life <= 0) {
                        scene.remove(p);
                        return false;
                    }
                    return true;
                });
            }
        }
        
        function getTechColor(techLevel) {
            if (techLevel < 0.3) return 0x0984e3;
            if (techLevel < 0.6) return 0xfdcb6e;
            return 0xff7675;
        }
        
        function posTo3D(pos) {
            // Map from universe space to visible space
            return new THREE.Vector3(
                (pos[0] - UNIVERSE_SIZE / 2) * 0.8,
                (pos[1] - UNIVERSE_SIZE / 2) * 0.8,
                (pos[2] - UNIVERSE_SIZE / 2) * 0.8
            );
        }
        
        function updateCivilizationOnMap(civ) {
            if (civMeshes[civ.id]) {
                scene.remove(civMeshes[civ.id].mesh);
                if (civMeshes[civ.id].glow) scene.remove(civMeshes[civ.id].glow);
                if (civMeshes[civ.id].rangeRing) scene.remove(civMeshes[civ.id].rangeRing);
            }

            const pos3d = posTo3D(civ.position);
            let color = civ.is_alive ? getTechColor(civ.tech_level) : 0xd63031;
            let size = 8 + civ.tech_level * 12;

            const geo = new THREE.SphereGeometry(size, 16, 16);
            const mat = new THREE.MeshBasicMaterial({ color, transparent: true, opacity: 0.9 });
            const mesh = new THREE.Mesh(geo, mat);
            mesh.position.copy(pos3d);
            mesh.userData.civId = civ.id;
            scene.add(mesh);

            // Detection range ring (transparent sphere wireframe)
            let rangeRing = null;
            if (civ.is_alive && civ.detection_range) {
                const rangeSize = (civ.detection_range / UNIVERSE_SIZE) * 800;
                const rangeGeo = new THREE.SphereGeometry(rangeSize, 12, 12);
                const rangeMat = new THREE.MeshBasicMaterial({
                    color: getTechColor(civ.tech_level),
                    transparent: true,
                    opacity: 0.04,
                    wireframe: true
                });
                rangeRing = new THREE.Mesh(rangeGeo, rangeMat);
                rangeRing.position.copy(pos3d);
                scene.add(rangeRing);
            }

            // Glow effect for alive civs
            let glow = null;
            if (civ.is_alive) {
                const glowGeo = new THREE.SphereGeometry(size * 2, 16, 16);
                const glowMat = new THREE.MeshBasicMaterial({ color, transparent: true, opacity: 0.15 });
                glow = new THREE.Mesh(glowGeo, glowMat);
                glow.position.copy(pos3d);
                scene.add(glow);
            }

            civMeshes[civ.id] = { mesh, glow, rangeRing, civ };
        }
        
        function updateCivilizations(civs) {
            civilizations = civs;
            document.getElementById('civ-count').textContent = `${civs.length} 个`;
            
            // Update map
            civs.forEach(updateCivilizationOnMap);
            
            // Update list
            const list = document.getElementById('civilization-list');
            if (civs.length === 0) {
                list.innerHTML = '<div class="empty-state">宇宙中还没有文明</div>';
                return;
            }
            
            list.innerHTML = civs.map(civ => `
                <div class="civilization-item ${civ.is_alive ? '' : 'dead'} ${selectedCivId === civ.id ? 'selected' : ''}"
                     onclick="showCivPopup('${civ.id}')">
                    <div>
                        <div class="civ-name">${civ.name}</div>
                        <div class="civ-info">
                            位置 (${civ.position.map(p => Math.round(p)).join(', ')})
                        </div>
                    </div>
                    <div class="civ-bars">
                        <div title="科技 ${Math.round(civ.tech_level*100)}%">
                            <div class="bar"><div class="bar-fill tech-fill" style="width:${civ.tech_level*100}%"></div></div>
                        </div>
                        <div title="防御 ${Math.round(civ.defense_level*100)}%">
                            <div class="bar"><div class="bar-fill defense-fill" style="width:${civ.defense_level*100}%"></div></div>
                        </div>
                        <div class="${civ.is_alive ? 'dot-alive' : 'dot-dead'}"></div>
                    </div>
                </div>
            `).join('');
        }
        
        function showCivPopup(civId, x, y) {
            const civ = civilizations.find(c => c.id === civId);
            if (!civ) return;
            selectedCivId = civId;
            
            const popup = document.getElementById('civ-popup');
            document.getElementById('popup-name').textContent = civ.name;
            document.getElementById('popup-tech').textContent = `${Math.round(civ.tech_level * 100)}%`;
            document.getElementById('popup-defense').textContent = `${Math.round(civ.defense_level * 100)}%`;
            document.getElementById('popup-signal').textContent = `${Math.round(civ.signal_control * 100)}%`;
            document.getElementById('popup-pos').textContent = `(${civ.position.map(p => Math.round(p)).join(', ')})`;
            document.getElementById('popup-status').innerHTML = civ.is_alive
                ? '<span style="color:#00b894">存活</span>'
                : '<span style="color:#d63031">已毁灭</span>';
            
            popup.style.left = Math.min(x + 10, window.innerWidth - 220) + 'px';
            popup.style.top = Math.min(y + 10, window.innerHeight - 200) + 'px';
            popup.classList.add('active');
            
            // Highlight on map
            Object.values(civMeshes).forEach(d => {
                d.mesh.material.opacity = d.civ.id === civId ? 1.0 : 0.5;
            });
            
            // Re-render list to show selection
            updateCivilizations(civilizations);
        }
        
        function hidePopup() {
            document.getElementById('civ-popup').classList.remove('active');
            selectedCivId = null;
            Object.values(civMeshes).forEach(d => { d.mesh.material.opacity = 0.9; });
            updateCivilizations(civilizations);
        }
        
        // WebSocket
        function connect() {
            const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
            ws = new WebSocket(`${protocol}//${window.location.host}/ws`);
            
            ws.onopen = () => {
                document.getElementById('status').classList.add('connected');
            };
            
            ws.onclose = () => {
                document.getElementById('status').classList.remove('connected');
                setTimeout(connect, 3000);
            };
            
            ws.onmessage = (event) => {
                const data = JSON.parse(event.data);
                
                if (data.type === 'init') {
                    updateUniverse(data.universe);
                    updateCivilizations(data.civilizations || []);
                    updateHistory(data.history || []);
                } else if (data.type === 'event') {
                    addEvent(data.event);
                    if (data.universe) updateUniverse(data.universe);
                    // Update map for any civilization changes
                    if (data.event && data.event.actor_id) {
                        fetch(`${window.location.protocol}//${window.location.host}/civilizations`)
                            .then(r => r.json())
                            .then(updateCivilizations)
                            .catch(() => {});
                    }
                } else if (data.type === 'civilization_detail') {
                    showCivPopup(data.civilization.id);
                }
            };
        }
        
        function updateUniverse(u) {
            document.getElementById('stat-civs').textContent = u.alive_civilizations;
            document.getElementById('stat-events').textContent = u.event_count;
            document.getElementById('stat-subworlds').textContent = u.total_subworlds;
        }
        
        function updateHistory(events) {
            // 只保留NOTABLE以上的事件（按时间倒序，TRIVIAL静默观察不显示）
            const notable = events.filter(e => {
                const sig = e.significance || 'NOTABLE';
                return sig !== 'TRIVIAL';
            });
            history = notable;
            renderEvents();
        }

        function renderEvents() {
            const feed = document.getElementById('event-feed');
            if (history.length === 0) {
                feed.innerHTML = '<div class="empty-state">等待重大宇宙事件...</div>';
                return;
            }

            feed.innerHTML = history.slice(-30).reverse().map(e => {
                const typeClass = getEventClass(e.event_type);
                const sig = e.significance || 'NOTABLE';
                const sigLabel = sig === 'CRITICAL' ? '🔴' : sig === 'MAJOR' ? '🟡' : '';
                const time = new Date(e.timestamp).toLocaleTimeString('zh-CN');
                const isCritical = sig === 'CRITICAL';
                return `
                    <div class="event-item ${typeClass}" style="${isCritical ? 'border-left-color:#ff4444 !important;background:rgba(255,68,68,0.08);' : ''}">
                        <div class="event-time">${sigLabel} ${time} · ${e.event_type} ${sig !== 'NOTABLE' ? '·' + sig : ''}</div>
                        <div class="event-narrative">${e.narrative || e.consequence || '—'}</div>
                    </div>
                `;
            }).join('');
        }

        function addEvent(event) {
            // TRIVIAL事件静默处理
            const sig = event.significance || 'NOTABLE';
            if (sig === 'TRIVIAL') return;

            history.push(event);
            renderEvents();

            // CRITICAL事件：全屏闪烁 + 爆炸效果
            if (sig === 'CRITICAL' && event.event_type === 'civilization_destroyed') {
                triggerExplosionEffect();
            } else if (sig === 'CRITICAL') {
                triggerCriticalEffect();
            } else if (sig === 'MAJOR') {
                triggerMajorEffect();
            }
        }

        function getEventClass(type) {
            const map = {
                'signal_sent': 'signal', 'signal_received': 'signal',
                'strike_launched': 'strike', 'strike_received': 'strike',
                'civilization_destroyed': 'death',
                'alliance_formed': 'alliance', 'alliance_broken': 'strike',
                'subworld_created': 'subworld', 'subworld_joined': 'subworld',
                'tech_advanced': 'tech', 'tech_explosion': 'tech',
                'observation': 'observation',
            };
            return map[type] || '';
        }

        // 全屏闪烁效果
        function triggerCriticalEffect() {
            const flash = document.createElement('div');
            flash.style.cssText = `
                position:fixed;top:0;left:0;right:0;bottom:0;
                background:rgba(255,68,68,0.15);
                pointer-events:none;z-index:9999;
                animation:flashFade 1.5s ease-out forwards;
            `;
            document.body.appendChild(flash);
            setTimeout(() => flash.remove(), 1500);
        }

        // 爆炸效果（针对文明摧毁）
        function triggerExplosionEffect() {
            // 全屏红色脉冲
            const flash = document.createElement('div');
            flash.style.cssText = `
                position:fixed;top:0;left:0;right:0;bottom:0;
                background:linear-gradient(135deg,rgba(255,50,50,0.3),rgba(255,100,0,0.2));
                pointer-events:none;z-index:9999;
                animation:flashFade 2s ease-out forwards;
            `;
            document.body.appendChild(flash);
            setTimeout(() => flash.remove(), 2000);

            // 地图上产生粒子爆炸
            if (window.explosionParticles) {
                window.explosionParticles.forEach(p => scene.remove(p));
            }
            window.explosionParticles = [];

            // 在地图中心或随机位置产生爆炸粒子
            const center = new THREE.Vector3(0, 0, 0);
            for (let i = 0; i < 50; i++) {
                const size = Math.random() * 4 + 2;
                const geo = new THREE.SphereGeometry(size, 8, 8);
                const mat = new THREE.MeshBasicMaterial({
                    color: Math.random() > 0.5 ? 0xff4444 : 0xff8800,
                    transparent: true, opacity: 1.0
                });
                const particle = new THREE.Mesh(geo, mat);
                particle.position.copy(center);
                particle.userData.velocity = new THREE.Vector3(
                    (Math.random() - 0.5) * 8,
                    (Math.random() - 0.5) * 8,
                    (Math.random() - 0.5) * 8
                );
                particle.userData.life = 60;
                scene.add(particle);
                window.explosionParticles.push(particle);
            }
        }

        function triggerMajorEffect() {
            const flash = document.createElement('div');
            flash.style.cssText = `
                position:fixed;top:0;left:0;right:0;bottom:0;
                background:rgba(253,203,110,0.1);
                pointer-events:none;z-index:9999;
                animation:flashFade 1s ease-out forwards;
            `;
            document.body.appendChild(flash);
            setTimeout(() => flash.remove(), 1000);
        }
        
        // Init
        window.addEventListener('resize', () => {
            const container = document.getElementById('universe-map');
            const w = container.clientWidth;
            const h = container.clientHeight;
            renderer.setSize(w, h);
            camera.aspect = w / h;
            camera.updateProjectionMatrix();
        });
        
        initThree();
        connect();
    </script>
</body>
</html>
